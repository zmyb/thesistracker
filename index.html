<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل XP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Tajawal:wght@400;500;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg: #0f0e17;
    --panel: #1a1826;
    --panel-2: #221f33;
    --line: #322e47;
    --text: #efeaf7;
    --muted: #948db3;
    --gold: #f2c94c;
    --gold-dim: #7a6a2a;
    --green: #6ee7a8;
    --red: #ff6b78;
    --font-display: 'Tajawal', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-title: 'Tajawal', sans-serif;
  }
  [data-theme="light"]{
    --bg: #f4f2fa;
    --panel: #ffffff;
    --panel-2: #eeeaf8;
    --line: #ddd5ec;
    --text: #221e33;
    --muted: #726a8c;
    --gold: #b9860a;
    --gold-dim: #ecd9a0;
    --green: #1f9d5c;
    --red: #d1414f;
  }

  /* ---------- Design theme: Islamic (احترافي أخضر وذهبي) ---------- */
  [data-design="islamic"][data-theme="dark"]{
    --bg: #0c1a14;
    --panel: #122a20;
    --panel-2: #193a2b;
    --line: #2c5240;
    --text: #eef6ef;
    --muted: #93b3a1;
    --gold: #d4af37;
    --gold-dim: #6b5a1f;
    --green: #4fae7a;
    --red: #d9707a;
    --font-title: 'Amiri', serif;
  }
  [data-design="islamic"][data-theme="light"]{
    --bg: #faf6ec;
    --panel: #ffffff;
    --panel-2: #f1ead9;
    --line: #ddd0ad;
    --text: #1f3325;
    --muted: #7a7060;
    --gold: #a9822b;
    --gold-dim: #e8d9ad;
    --green: #1f7a4c;
    --red: #b23a3a;
    --font-title: 'Amiri', serif;
  }

  /* ---------- Design theme: Purple (لافندر وأبيض وأسود وزهري) ---------- */
  [data-design="purple"][data-theme="dark"]{
    --bg: #1a1225;
    --panel: #241a33;
    --panel-2: #2f2140;
    --line: #4a3660;
    --text: #f4eefb;
    --muted: #ac98c8;
    --gold: #e8a0c4;
    --gold-dim: #7a4a63;
    --green: #a8d8bd;
    --red: #ef6f9e;
    --font-title: 'Tajawal', sans-serif;
  }
  [data-design="purple"][data-theme="light"]{
    --bg: #faf6ff;
    --panel: #ffffff;
    --panel-2: #f3ecfc;
    --line: #e0d0f0;
    --text: #241833;
    --muted: #8a7a9c;
    --gold: #c060a0;
    --gold-dim: #f0c8e0;
    --green: #4a9d6e;
    --red: #d1417a;
    --font-title: 'Tajawal', sans-serif;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    padding: 20px 14px 60px;
    min-height: 100vh;
    transition: background .2s ease, color .2s ease;
  }
  .wrap{ max-width: 480px; margin: 0 auto; transition: max-width .2s ease; }
  .wrap.wide{ max-width: 1100px; }

  /* Content area / columns for wide layout */
  .content-area{ display:block; }
  .wrap.wide .content-area{ column-count: 2; column-gap: 20px; }
  .content-block{ break-inside: avoid; margin-bottom: 16px; }

  /* Icon toggle buttons (theme / layout) */
  .icon-toggle-btn{
    background: var(--panel-2); border:1px solid var(--line); color: var(--text);
    width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .design-select{
    background: var(--panel-2); border:1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 5px 6px; font-family: var(--font-display);
    font-size: 11px; cursor:pointer; flex-shrink:0;
  }

  /* Header */
  .title{
    font-size: 22px; font-weight: 900; letter-spacing: .5px;
    display:flex; align-items:center; gap:8px; margin-bottom:2px;
    font-family: var(--font-title);
  }
  .title span.mark{ color: var(--gold); }
  .subtitle{ color: var(--muted); font-size: 13px; margin-bottom: 18px; }

  /* Phase HUD */
  .phase-hud{
    display:flex; gap:4px; margin-bottom: 6px;
  }
  .phase-seg{
    height: 10px; border-radius: 6px; background: var(--panel-2);
    border: 1px solid var(--line); overflow:hidden; position:relative;
  }
  .phase-seg .fill{
    height:100%; border-radius: 6px 0 0 6px;
    transition: width .4s ease;
  }
  .phase-labels{
    display:flex; justify-content:space-between; font-family: var(--font-mono);
    font-size: 11px; color: var(--muted); margin-bottom: 20px;
  }
  .phase-labels b{ color: var(--text); }

  /* Today card */
  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 0;
  }
  .xp-row{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; }
  .xp-today{
    font-family: var(--font-mono); font-weight: 800; font-size: 34px;
  }
  .xp-today.neg{ color: var(--red); }
  .xp-today.pos{ color: var(--green); }
  .xp-goal-label{ color: var(--muted); font-size: 13px; font-family: var(--font-mono); }
  .bar-track{
    height: 14px; background: var(--panel-2); border-radius: 8px;
    border: 1px solid var(--line); overflow:hidden;
  }
  .bar-fill{
    height:100%; border-radius: 8px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width .4s ease;
  }
  .bar-fill.done{ background: linear-gradient(90deg, #2d7a52, var(--green)); }

  /* Action grid */
  .actions{
    display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0;
  }
  .act-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 6px; padding: 14px 8px; border-radius: 14px; border: 1px solid var(--line);
    background: var(--panel); color: var(--text); cursor:pointer;
    font-family: var(--font-display); font-size: 13px; font-weight:700;
    transition: transform .12s ease, border-color .12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .act-btn:active{ transform: scale(0.96); }
  .act-btn .emoji{ font-size: 22px; }
  .act-btn .xp{ font-family: var(--font-mono); font-size: 12px; }
  .act-btn.plus{ border-color: rgba(110,231,168,.35); }
  .act-btn.plus .xp{ color: var(--green); }
  .act-btn.minus{ border-color: rgba(255,107,120,.35); }
  .act-btn.minus .xp{ color: var(--red); }
  .act-btn.wide{ grid-column: span 2; flex-direction: row; }
  .act-btn{ position: relative; }
  .act-btn .del-x{
    position:absolute; top:4px; left:4px; width:18px; height:18px;
    border-radius:50%; background: var(--panel-2); border:1px solid var(--line);
    color: var(--muted); font-size:11px; line-height:16px; text-align:center;
    cursor:pointer;
  }
  .act-btn .edit-pencil{
    position:absolute; top:4px; right:4px; width:18px; height:18px;
    border-radius:50%; background: var(--panel-2); border:1px solid var(--line);
    color: var(--muted); font-size:10px; line-height:16px; text-align:center;
    cursor:pointer;
  }
  .add-panel .reset-link{
    background:none; border:none; color: var(--muted); font-size:12px;
    text-decoration: underline; cursor:pointer; padding:0; margin-inline-end:auto;
  }
  .act-btn.add-new{
    border-style: dashed; border-color: var(--line); color: var(--muted);
    background: transparent;
  }

  /* Sections + sorting */
  .section-header{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px; flex-wrap:wrap;
  }
  .section-title{ font-size:14px; font-weight:800; margin:0; display:flex; align-items:center; gap:6px; }
  .section-title.plus{ color: var(--green); }
  .section-title.minus{ color: var(--red); }
  .sort-controls{ display:flex; gap:4px; }
  .sort-btn{
    background: var(--panel-2); border:1px solid var(--line); color: var(--muted);
    font-family: var(--font-display); font-size:11px; border-radius:8px; padding:5px 8px; cursor:pointer;
  }
  .sort-btn.active{ background: var(--gold); color:#241f0a; border-color: var(--gold); font-weight:700; }
  .order-arrows{ display:flex; gap:4px; margin-top:2px; }
  .arrow-btn{
    width:22px; height:18px; border-radius:5px; background: var(--panel-2); border:1px solid var(--line);
    color: var(--muted); font-size:10px; cursor:pointer; line-height:1;
  }

  /* Add-action panel */
  .add-panel{
    background: var(--panel); border:1px solid var(--line); border-radius:14px;
    padding: 14px; margin-top:12px; display:flex; flex-direction:column; gap:10px;
  }
  .add-panel input[type="text"], .add-panel input[type="number"]{
    background: var(--panel-2); border:1px solid var(--line); border-radius:10px;
    padding: 10px 12px; color: var(--text); font-family: var(--font-display); font-size:14px;
  }
  .add-panel .row{ display:flex; gap:8px; }
  .add-panel .row input[type="number"]{ width: 100px; font-family: var(--font-mono); }
  .add-panel .actions-row{ display:flex; gap:8px; justify-content:flex-end; }
  .add-panel button{
    border-radius:10px; border:1px solid var(--line); padding: 9px 14px;
    font-family: var(--font-display); font-weight:700; font-size: 13px; cursor:pointer;
  }
  .add-panel .save-btn{ background: var(--gold); color:#241f0a; border-color: var(--gold); }
  .add-panel .cancel-btn{ background: transparent; color: var(--muted); }
  .add-hint{ color: var(--muted); font-size:11px; }

  /* Log */
  .log-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px; }
  .log-header h3{ font-size: 14px; margin:0; color: var(--muted); font-weight:700; }
  .log-day-nav{ display:flex; align-items:center; gap:8px; }
  .daynav-btn{
    background: var(--panel-2); border:1px solid var(--line); color: var(--text);
    width:26px; height:26px; border-radius:8px; cursor:pointer; font-size:14px;
  }
  .daynav-btn:disabled{ opacity:.35; cursor:default; }
  .undo{ font-size:12px; color: var(--muted); background:none; border:none; cursor:pointer; text-decoration: underline; padding:0; }
  .undo:disabled{ opacity:.4; cursor:default; text-decoration:none; }
  .log-list{ display:flex; flex-direction:column; gap:6px; }
  .log-empty{ color: var(--muted); font-size:13px; text-align:center; padding: 14px 0; }
  .log-item{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--panel-2); border:1px solid var(--line); border-radius:10px;
    padding: 8px 12px; font-size: 13px;
  }
  .log-item .l-left{ display:flex; align-items:center; gap:8px; }
  .log-item .l-time{ color: var(--muted); font-family: var(--font-mono); font-size:11px; }
  .log-item .l-xp{ font-family: var(--font-mono); font-weight:700; }
  .log-item .l-xp.pos{ color: var(--green); }
  .log-item .l-xp.minus{ color: var(--red); }
  .log-item-wrap{ background: var(--panel-2); border:1px solid var(--line); border-radius:10px; padding: 8px 12px; }
  .log-item-wrap .log-item{ background: none; border:none; padding:0; }
  .entry-icon-btn{
    background:none; border:none; color: var(--muted); cursor:pointer; font-size:13px; padding:2px;
  }
  .entry-icon-btn:hover{ color: var(--text); }
  .log-note{
    margin-top:6px; padding-top:6px; border-top:1px dashed var(--line);
    color: var(--text); font-size:12px; white-space: pre-wrap; line-height:1.6;
  }
  .note-toggle{
    background:none; border:none; color: var(--muted); font-size:11px;
    text-decoration: underline; cursor:pointer; padding:0; margin-top:6px;
  }
  .note-editor{ margin-top:8px; display:flex; flex-direction:column; gap:8px; }
  .note-editor textarea{
    background: var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:10px; color: var(--text); font-family: var(--font-display); font-size:13px;
    min-height: 70px; resize: vertical;
  }
  .note-editor select{
    background: var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:8px 10px; color: var(--text); font-family: var(--font-display); font-size:13px;
  }
  .note-editor input[type="text"], .note-editor input[type="number"]{
    background: var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:9px 10px; color: var(--text); font-family: var(--font-display); font-size:13px;
  }
  .note-editor .actions-row{ display:flex; gap:8px; justify-content:flex-end; }
  .note-editor button{
    border-radius:10px; border:1px solid var(--line); padding: 7px 12px;
    font-family: var(--font-display); font-weight:700; font-size: 12px; cursor:pointer;
  }
  .note-editor .save-btn{ background: var(--gold); color:#241f0a; border-color: var(--gold); }
  .note-editor .cancel-btn{ background: transparent; color: var(--muted); }

  /* History */
  .history{ display:flex; gap:6px; align-items:flex-end; height: 60px; margin-top: 6px; }
  .hist-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .hist-bar{ width:100%; border-radius:4px 4px 0 0; background: var(--gold-dim); min-height:2px; }
  .hist-bar.pos{ background: var(--green); }
  .hist-bar.neg{ background: var(--red); }
  .hist-bar.is-today{ box-shadow: 0 0 0 2px var(--gold) inset; }
  .hist-day{ font-size: 10px; color: var(--muted); font-family: var(--font-mono); }
  .hist-day.is-today{ color: var(--gold); font-weight:800; }

  /* Calendar */
  .cal-toggle{
    width:100%; background: var(--panel-2); border:1px solid var(--line); border-radius:10px;
    color: var(--text); font-family: var(--font-display); font-weight:700; font-size:13px;
    padding: 10px; cursor:pointer;
  }
  .calendar{ margin-top: 14px; }
  .cal-month{ margin-bottom: 20px; }
  .cal-month-title{ font-size:13px; font-weight:700; color: var(--text); margin-bottom:8px; }
  .cal-weekdays, .cal-grid{
    display:grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-weekdays{ margin-bottom:4px; }
  .cal-weekdays span{ text-align:center; font-size:10px; color: var(--muted); font-family: var(--font-mono); }
  .cal-day{
    aspect-ratio: 1; border-radius: 8px; border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: var(--panel-2); gap:2px;
  }
  .cal-day:not(.oor){ cursor:pointer; }
  .cal-day.oor{ background: transparent; border-color: transparent; opacity:.28; cursor:default; }
  .cal-day.zero{ background: var(--panel-2); }
  .cal-day.partial{ background: rgba(242,201,76,.14); border-color: rgba(242,201,76,.4); }
  .cal-day.goal{ background: rgba(110,231,168,.16); border-color: rgba(110,231,168,.4); }
  .cal-day.neg{ background: rgba(255,107,120,.16); border-color: rgba(255,107,120,.4); }
  .cal-day.today{ box-shadow: 0 0 0 2px var(--gold) inset; }
  .cal-day.viewing{ box-shadow: 0 0 0 2px #5aa9e0 inset; }
  .cal-day.today.viewing{ box-shadow: 0 0 0 2px var(--gold) inset, 0 0 0 4px #5aa9e0 inset; }
  .cal-daynum{ font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .cal-xp{ font-family: var(--font-mono); font-size: 10px; font-weight:700; }
  .cal-day.goal .cal-xp{ color: var(--green); }
  .cal-day.partial .cal-xp{ color: var(--gold); }
  .cal-day.neg .cal-xp{ color: var(--red); }
  .cal-day.zero .cal-xp{ color: var(--muted); }
  .cal-legend{ display:flex; gap:14px; margin-top:8px; font-size:11px; color: var(--muted); flex-wrap:wrap; }
  .cal-legend .dot{ display:inline-block; width:9px; height:9px; border-radius:3px; margin-inline-end:4px; vertical-align:middle; }

  .loading{ text-align:center; color: var(--muted); padding: 60px 0; font-family: var(--font-mono); font-size:13px; }
  .footnote{ text-align:center; color: var(--muted); font-size:11px; margin-top: 18px; }

  /* Level + Streak */
  .level-badge{
    display:flex; align-items:center; gap:6px; font-weight:800; font-size:14px;
    color: var(--gold); margin-bottom: 4px;
  }
  .level-badge .lv-num{ font-family: var(--font-mono); }
  .streak-line{
    display:flex; align-items:center; gap:6px; font-size:13px; color: var(--muted);
    margin-bottom: 12px; font-family: var(--font-mono); font-weight:700;
  }
  .streak-line b{ color: var(--text); }

  /* Stats */
  .stats-grid{
    display:grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .achv-counts{ display:flex; flex-direction:column; gap:6px; margin-top:12px; }
  .achv-count-item{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--panel-2); border:1px solid var(--line); border-radius:10px;
    padding: 8px 12px; font-size: 13px; gap:8px;
  }
  .achv-count-item .achv-label{ flex:1; }
  .achv-count-item .achv-num{
    font-family: var(--font-mono); font-weight:800; color: var(--gold);
    white-space: nowrap;
  }
  .stat-item{
    background: var(--panel-2); border:1px solid var(--line); border-radius:12px;
    padding: 12px; display:flex; flex-direction:column; gap:4px;
  }
  .stat-item .stat-label{ font-size:11px; color: var(--muted); }
  .stat-item .stat-value{ font-family: var(--font-mono); font-weight:800; font-size:18px; }
  .stat-item .stat-value.pos{ color: var(--green); }
  .stat-item .stat-value.neg{ color: var(--red); }

  /* Daily message */
  .daily-message{
    text-align:center; background: var(--panel); border:1px solid var(--line);
    border-radius: 14px; padding: 12px; margin-top: 16px; font-size:13px;
    color: var(--text); font-family: var(--font-mono); font-weight:700;
  }

  /* Thesis progress tracker */
  .progress-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px; flex-wrap:wrap; }
  .progress-header h3{ margin:0; font-size:15px; }
  .progress-overall{ font-family: var(--font-mono); font-weight:800; color: var(--gold); font-size:13px; }
  .progress-sections{ display:flex; flex-direction:column; gap:10px; }
  .progress-section{ border:1px solid var(--line); border-radius:12px; overflow:hidden; background: var(--panel-2); }
  .progress-section-header{
    width:100%; display:flex; justify-content:space-between; align-items:center; gap:8px;
    background:none; border:none; padding:10px 12px; cursor:pointer; color: var(--text);
    font-family: var(--font-display); font-size:13px; font-weight:700; text-align:right;
  }
  .progress-section-pct{ font-family: var(--font-mono); font-size:11px; color: var(--muted); font-weight:700; white-space:nowrap; }
  .progress-section-body{ padding: 10px 12px 12px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:10px; }
  .progress-item{ display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer; }
  .progress-item input[type="checkbox"]{ width:16px; height:16px; accent-color: var(--gold); cursor:pointer; flex-shrink:0; }
  .progress-group{ display:flex; flex-direction:column; gap:6px; }
  .progress-group-title{ font-size:12px; font-weight:800; color: var(--text); }
  .progress-group-pct{ font-family: var(--font-mono); font-weight:600; color: var(--muted); font-size:11px; }
  .progress-group-items{ display:grid; grid-template-columns: 1fr 1fr; gap:4px 10px; }
  .progress-custom-list{ display:flex; flex-direction:column; gap:6px; }
  .progress-custom-item{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .progress-custom-item .progress-item{ flex:1; }
  .progress-custom-del{
    background:none; border:none; color: var(--muted); cursor:pointer; font-size:12px; padding:2px 4px; flex-shrink:0;
  }
  .progress-custom-del:hover{ color: var(--red); }
  .progress-item-time{ font-family: var(--font-mono); font-size:10px; color: var(--muted); font-weight:400; }
  .progress-add-btn{
    width:100%; background: transparent; border:1px dashed var(--line); border-radius:10px;
    color: var(--muted); font-family: var(--font-display); font-weight:700; font-size:13px;
    padding: 10px; cursor:pointer; margin-top: 4px;
  }
  .progress-add-panel{
    background: var(--panel); border:1px solid var(--line); border-radius:14px;
    padding: 14px; margin-top:10px; display:flex; flex-direction:column; gap:10px;
  }
  .progress-add-panel input[type="text"]{
    background: var(--panel-2); border:1px solid var(--line); border-radius:10px;
    padding: 10px 12px; color: var(--text); font-family: var(--font-display); font-size:14px;
  }
  .progress-add-panel select{
    background: var(--panel-2); border:1px solid var(--line); border-radius:10px;

function parseJwt(token){
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(jsonPayload);
}

function isProgressDeleted(id){
  return (state.deletedProgress || []).includes(id);
}

function groupIds(g){
  const ids = [];
  for(let i=1;i<=g.count;i++) ids.push(`${g.id}_m${i}`);
  return ids.filter(id => !isProgressDeleted(id));
}

function sectionLeafIds(section){
  const base = section.type === 'flat'
    ? section.items.map(i => i.id).filter(id => !isProgressDeleted(id))
    : (() => {
      let ids = [];
      section.groups.forEach(g => { ids = ids.concat(groupIds(g)); });
      return ids;
    })();
  const custom = (state.customProgress || []).filter(c => c.sectionId === section.id).map(c => c.id);
  return [...base, ...custom];
}

function sectionProgress(section){
  const ids = sectionLeafIds(section);
  const checked = ids.filter(id => state.progress[id]).length;
  return { checked, total: ids.length, pct: ids.length ? Math.round(checked/ids.length*100) : 0 };
}

function overallProgress(){
  let checked = 0, total = 0;
  THESIS_STRUCTURE.forEach(sec => {
    const ids = sectionLeafIds(sec);
    total += ids.length;
    checked += ids.filter(id => state.progress[id]).length;
  });
  return { checked, total, pct: total ? Math.round(checked/total*100) : 0 };
}

function renderProgressItemRow(id, label, opts){
  opts = opts || {};
  const ts = fmtProgressTimestamp(id);
  const delAttr = opts.builtin ? `data-del-builtin-progress="${id}" data-del-builtin-label="${escapeHtml(label)}"` : `data-del-custom-progress="${id}"`;

      </label>

    </div>
  `;
}

function renderProgressSection(section){
  const prog = sectionProgress(section);
  const isOpen = !!progressOpenSections[section.id];
  let bodyHtml = '';
  if(section.type === 'flat'){
    bodyHtml = `<div class="progress-custom-list">${section.items
      .filter(item => !isProgressDeleted(item.id))
      .map(item => renderProgressItemRow(item.id, item.label, { builtin: true }))
      .join('')}</div>`;
  } else {
    bodyHtml = section.groups.map(g => {
      const gIds = groupIds(g);
      const gChecked = gIds.filter(id => state.progress[id]).length;
      const gPct = gIds.length ? Math.round(gChecked/gIds.length*100) : 0;

          }).join('')}
        </div>

      `;
    }).join('');
  }
  const customItems = customItemsForSection(section.id);

    ${isOpen ? `<div class="progress-section-body">${bodyHtml}${customHtml}</div>` : ''}

}

function todayKey(d = new Date()){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function dateFromKey(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y, m-1, d); }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }

// days count per phase, derived from its date range
PHASES.forEach(p => { p.days = daysBetween(dateFromKey(p.start), dateFromKey(p.end)) + 1; });
const TOTAL_DAYS = daysBetween(dateFromKey(START_DATE), dateFromKey(END_DATE)) + 1;

const MONTH_NAMES = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
// Monday-first weekday header
const WEEKDAY_SHORT = ['إثن','ثلا','أرب','خمي','جمع','سبت','أحد'];

let calendarOpen = false;

// Currently viewed day in the log/top card (defaults to today; navigable)
let viewingDateKey = todayKey();

function clampDateKey(key){
  if(key < START_DATE) return START_DATE;
  if(key > END_DATE) return END_DATE;
  return key;
}
function shiftViewingDate(delta){
  const d = dateFromKey(viewingDateKey);
  d.setDate(d.getDate()+delta);
  viewingDateKey = clampDateKey(todayKey(d));
  editingEntryId = null; editingNoteId = null;
  render();
}
function jumpToToday(){
  viewingDateKey = todayKey();
  editingEntryId = null; editingNoteId = null;
  render();
}
function viewDate(key){
  if(key < START_DATE || key > END_DATE) return;
  viewingDateKey = key;
  editingEntryId = null; editingNoteId = null;
  render();
  setTimeout(()=>{
    const el = document.getElementById('logCard');
    if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 30);
}

function buildCalendarMonths(){
  const start = dateFromKey(START_DATE);
  const end = dateFromKey(END_DATE);
  const months = [];
  let cur = new Date(start.getFullYear(), start.getMonth(), 1);
  const endMonth = new Date(end.getFullYear(), end.getMonth(), 1);
  while(cur <= endMonth){
    const year = cur.getFullYear(), month = cur.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    months.push({ year, month, daysInMonth });
    cur = new Date(year, month + 1, 1);
  }
  return months;
}

function escapeHtml(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function uniqueId(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

let state = null;

function migrateEntries(){
  let changed = false;
  Object.values(state.days).forEach(list => {
    list.forEach(e => {
      if(!e.id){ e.id = uniqueId(); changed = true; }
      if(e.note === undefined){ e.note = ''; changed = true; }
    });
  });
  return changed;
}

async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) throw new Error('no saved state');
    state = JSON.parse(raw);
    if(!state.customActions) state.customActions = [];
    if(!state.overrides) state.overrides = {};
    if(!state.sortMode) state.sortMode = { plus: 'default', minus: 'default' };
    if(!state.manualOrder) state.manualOrder = { plus: [], minus: [] };
    if(!state.progress) state.progress = {};
    if(!state.customProgress) state.customProgress = [];
    if(!state.deletedProgress) state.deletedProgress = [];
    if(!state.progressTimestamps) state.progressTimestamps = {};
    if(migrateEntries()) await saveState();
  }catch(e){
    state = { days: {}, customActions: [], overrides: {}, sortMode: { plus:'default', minus:'default' }, manualOrder: { plus:[], minus:[] }, progress: {}, customProgress: [], deletedProgress: [], progressTimestamps: {} };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
}

function effectiveAction(a){
  const o = state.overrides[a.id];
  if(!o) return a;
  const xp = (typeof o.xp === 'number') ? o.xp : a.xp;
  return { ...a, label: o.label ?? a.label, xp, kind: xp >= 0 ? 'plus' : 'minus' };
}

function allActions(){
  return [...ACTIONS.map(effectiveAction), ...state.customActions];
}

function computeSectionActions(kind, mode){
  const items = allActions().filter(a => a.kind === kind);
  if(mode === 'asc') return items.slice().sort((a,b) => a.xp - b.xp);
  if(mode === 'desc') return items.slice().sort((a,b) => b.xp - a.xp);
  if(mode === 'manual'){
    const order = state.manualOrder[kind] || [];
    return items.slice().sort((a,b) => {
      const ia = order.indexOf(a.id), ib = order.indexOf(b.id);
      return (ia === -1 ? Infinity : ia) - (ib === -1 ? Infinity : ib);
    });
  }
  return items;
}

function getSectionActions(kind){
  return computeSectionActions(kind, state.sortMode[kind]);
}

async function setSortMode(kind, mode){
  if(mode === 'manual'){
    const prevMode = state.sortMode[kind];
    if(!state.manualOrder[kind] || state.manualOrder[kind].length === 0){
      state.manualOrder[kind] = computeSectionActions(kind, prevMode === 'manual' ? 'default' : prevMode).map(a => a.id);
    }
  }
  state.sortMode[kind] = mode;
  await saveState();
  render();
}

async function moveAction(kind, id, dir){
  const currentIds = computeSectionActions(kind, 'manual').map(a => a.id);
  const order = currentIds.slice();
  const idx = order.indexOf(id);
  const swapIdx = idx + dir;
  if(idx === -1 || swapIdx < 0 || swapIdx >= order.length) return;
  [order[idx], order[swapIdx]] = [order[swapIdx], order[idx]];
  state.manualOrder[kind] = order;
  await saveState();
  render();
}

let editingId = null;

}

async function removeCustomAction(id){

  await saveState();

}

function isBuiltIn(id){
  return ACTIONS.some(a => a.id === id);
}

async function saveEdit(id, label, xp){
  const customIdx = state.customActions.findIndex(a => a.id === id);
  if(customIdx !== -1){
    state.customActions[customIdx].label = label;
    state.customActions[customIdx].xp = xp;
    state.customActions[customIdx].kind = xp >= 0 ? 'plus' : 'minus';
  } else {
    state.overrides[id] = { label, xp };
  }
  await saveState();
  editingId = null;
  render();
}

  }
}

function getEntriesFor(key){
  if(!state.days[key]) state.days[key] = [];
  return state.days[key];
}
function getTodayEntries(){
  return getEntriesFor(todayKey());
}

function phaseInfo(){
  const start = dateFromKey(START_DATE);
  const today = new Date(); today.setHours(0,0,0,0);
  const elapsed = daysBetween(start, today); // 0-indexed; negative if before start
  const dayNum = elapsed + 1;

  if(dayNum < 1){
    return { notStarted:true, daysUntilStart: 1 - dayNum, dayNum: 0, currentPhaseIdx: -1, dayInPhase: 0, finished:false };
  }
  if(dayNum > TOTAL_DAYS){
    return { notStarted:false, finished:true, dayNum, currentPhaseIdx: PHASES.length-1, dayInPhase: PHASES[PHASES.length-1].days };
  }
  let cursor = 0, currentPhaseIdx = PHASES.length - 1, dayInPhase = PHASES[PHASES.length-1].days;
  for(let i=0;i<PHASES.length;i++){
    if(dayNum <= cursor + PHASES[i].days){
      currentPhaseIdx = i;
      dayInPhase = dayNum - cursor;
      break;
    }
    cursor += PHASES[i].days;
  }
  return { notStarted:false, finished:false, dayNum, currentPhaseIdx, dayInPhase };
}

function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleTimeString('ar', { hour:'2-digit', minute:'2-digit' });
}

function last7Days(){
  const out = [];
  const todayK = todayKey();
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    const k = todayKey(d);
    const entries = state.days[k] || [];
    const total = entries.reduce((s,e)=>s+e.xp,0);
    out.push({ key:k, label: d.toLocaleDateString('ar', { weekday:'short' }), total, isToday: k === todayK });
  }
  return out;
}

function totalXpAllTime(){
  return Object.values(state.days).reduce((sum, entries) => sum + entries.reduce((s,e)=>s+e.xp,0), 0);
}

function levelInfo(){
  const totalXp = Math.max(0, totalXpAllTime());
  let level = Math.floor(totalXp / 1000) + 1;
  if(level > LEVEL_TITLES.length) level = LEVEL_TITLES.length;
  const title = LEVEL_TITLES[level - 1];
  return { level, title, totalXp };
}

function computeStreak(){
  let d = new Date(); d.setHours(0,0,0,0);
  const todayEntries = state.days[todayKey(d)] || [];
  const todayTotal = todayEntries.reduce((s,e)=>s+e.xp,0);
  if(todayTotal < DAILY_GOAL){
    d.setDate(d.getDate() - 1);
  }
  let streak = 0;
  while(true){
    const k = todayKey(d);
    const entries = state.days[k];
    if(!entries || entries.length === 0) break;
    const total = entries.reduce((s,e)=>s+e.xp,0);
    if(total >= DAILY_GOAL){
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

async function checkStreakBonus(){
  const streak = computeStreak();
  if(streak > 0 && streak % 7 === 0){
    if(!state.streakBonusDays) state.streakBonusDays = [];
    const key = todayKey();
    if(!state.streakBonusDays.includes(key)){
      const entries = getTodayEntries();
      entries.push({ id: uniqueId(), aid:'streak_bonus', label: `🔥 مكافأة سلسلة ${streak} أيام متتالية`, xp:50, ts: Date.now(), note:'' });
      state.streakBonusDays.push(key);
      await saveState();
    }
  }
}

function computeStats(){
  const activeDays = Object.keys(state.days)
    .filter(k => (state.days[k] || []).length > 0)
    .map(k => ({ key:k, total: state.days[k].reduce((s,e)=>s+e.xp,0), count: state.days[k].length }));

  const activeDaysCount = activeDays.length;
  const sumTotal = activeDays.reduce((s,d)=>s+d.total,0);
  const avg = activeDaysCount > 0 ? sumTotal / activeDaysCount : 0;

  let best = null, worst = null;
  activeDays.forEach(d => {
    if(!best || d.total > best.total) best = d;
    if(!worst || d.total < worst.total) worst = d;
  });

  let achievementsCount = 0, violationsCount = 0;
  Object.values(state.days).forEach(entries => {
    (entries || []).forEach(e => {
      if(e.xp >= 0) achievementsCount++;
      else violationsCount++;
    });
  });

  return { avg, best, worst, achievementsCount, violationsCount, streak: computeStreak() };
}

function computeAchievementCounts(){
  const counts = {};
  Object.values(state.days).forEach(entries => {
    (entries || []).forEach(e => {
      if(e.xp >= 0 && e.aid !== 'streak_bonus'){
        counts[e.label] = (counts[e.label] || 0) + 1;
      }
    });
  });
  const plusActions = getSectionActions('plus');
  const ordered = [];
  plusActions.forEach(a => {
    if(counts[a.label] !== undefined) ordered.push({ label: a.label, count: counts[a.label] });
  });
  Object.keys(counts).forEach(label => {
    if(!ordered.some(o => o.label === label)) ordered.push({ label, count: counts[label] });
  });
  return ordered;
}

function fmtStatDate(key){
  const d = dateFromKey(key);

}

function dailyMessage(info){
  const { notStarted, daysUntilStart, finished, dayNum, currentPhaseIdx, dayInPhase } = info;
  if(notStarted){
    return `يبدأ التحدي بعد ${daysUntilStart === 1 ? 'يوم واحد' : daysUntilStart + ' أيام'}`;
  }
  if(finished){
    return `اليوم ${dayNum} | انتهت جميع المراحل 🏁`;
  }
  const phaseDays = PHASES[currentPhaseIdx].days;
  const daysLeft = phaseDays - dayInPhase;
  const phaseWord = ORDINAL_PHASE_NAMES[currentPhaseIdx] || PHASES[currentPhaseIdx].name;
  if(daysLeft <= 0){
    return `اليوم ${dayNum} | اليوم الأخير في المرحلة ${phaseWord}`;
  }
  return `اليوم ${dayNum} | تبقى ${daysLeft} ${daysLeft === 1 ? 'يوم' : 'أيام'} لإنهاء المرحلة ${phaseWord}`;
}

            <div class="stat-item">
              <span class="stat-label">أفضل يوم</span>
              <span class="stat-value pos">${stats.best ? (stats.best.total>=0?'+':'')+stats.best.total : '—'}</span>
              <span class="stat-label">${stats.best ? fmtStatDate(stats.best.key) : ''}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">أسوأ يوم</span>
              <span class="stat-value ${stats.worst && stats.worst.total<0?'neg':'pos'}">${stats.worst ? (stats.worst.total>=0?'+':'')+stats.worst.total : '—'}</span>
              <span class="stat-label">${stats.worst ? fmtStatDate(stats.worst.key) : ''}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">سلسلة الأيام المتتالية</span>
              <span class="stat-value">🔥 ${stats.streak}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">عدد الإنجازات</span>
              <span class="stat-value pos">${stats.achievementsCount}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">عدد المخالفات</span>
              <span class="stat-value neg">${stats.violationsCount}</span>
            </div>
          </div>
          ${achievementCounts.length ? `
          <div class="add-hint" style="margin-top:14px;">📋 عدد مرات كل إنجاز</div>
          <div class="achv-counts">
            ${achievementCounts.map(a => `
              <div class="achv-count-item">
                <span class="achv-label">${escapeHtml(a.label)}</span>
                <span class="achv-num">× ${a.count}</span>
              </div>
            `).join('')}
          </div>` : ''}
        </div>
      </div>

      <div class="content-block">
        <div class="footnote">البيانات محفوظة تلقائيًا على هذا الجهاز</div>
        <div class="daily-message">${dailyMessage({ notStarted, daysUntilStart, finished, dayNum, currentPhaseIdx, dayInPhase })}</div>
      </div>

      <div class="content-block">
        <div class="card">
          <div class="progress-header">
            <h3>📈 نسبة التقدم</h3>
            <span class="progress-overall">${overallProgress().pct}% (${overallProgress().checked}/${overallProgress().total})</span>
          </div>
          <div class="progress-sections">
            ${THESIS_STRUCTURE.map(sec => renderProgressSection(sec)).join('')}
          </div>
          <button class="progress-add-btn" id="openProgressAdd">${progressAddPanelOpen ? '✕ إغلاق' : '➕ أضف عنصرًا جديدًا للتتبع'}</button>
          ${progressAddPanelOpen ? `
          <div class="progress-add-panel">
            <input type="text" id="newProgressLabel" placeholder="اسم العنصر (مثال: مراجعة لغوية)" maxlength="60">
            <select id="newProgressSection">
              ${THESIS_STRUCTURE.map(sec => `<option value="${sec.id}">${sec.title}</option>`).join('')}
            </select>
            <div class="add-hint">سيُضاف العنصر كخانة اختيار مستقلة أسفل القسم الذي تختاره، ويمكن حذفه لاحقًا بالضغط على ✕ بجانبه</div>
            <div class="actions-row">
              <button class="cancel-btn" id="cancelProgressAdd">إلغاء</button>
              <button class="save-btn" id="saveProgressAdd">حفظ العنصر</button>
            </div>
          </div>` : ''}
        </div>
      </div>

    </div>
  `;

  allActions().forEach(a => {
    const btn = app.querySelector(`[data-id="${a.id}"]`);
    if(btn) btn.addEventListener('click', (ev) => {
      if(ev.target.closest('.del-x') || ev.target.closest('.edit-pencil') || ev.target.closest('.order-arrows')) return;
      addEntry(a);
    });
  });
  app.querySelectorAll('[data-del]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      removeCustomAction(x.getAttribute('data-del'));
    });
  });
  app.querySelectorAll('[data-edit]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      editingId = x.getAttribute('data-edit');
      addPanelOpen = false;
      editingNoteId = null;
      editingEntryId = null;
      render();
    });
  });
  app.querySelectorAll('[data-sort-kind]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      setSortMode(x.getAttribute('data-sort-kind'), x.getAttribute('data-sort-mode'));
    });
  });
  app.querySelectorAll('[data-move-id]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      moveAction(x.getAttribute('data-move-kind'), x.getAttribute('data-move-id'), parseInt(x.getAttribute('data-move-dir'), 10));
    });
  });
  app.querySelectorAll('[data-open-note]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      editingNoteId = x.getAttribute('data-open-note');
      addPanelOpen = false;
      editingId = null;
      editingEntryId = null;
      render();
    });
  });
  app.querySelectorAll('[data-cancel-note]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      editingNoteId = null;
      render();
    });
  });
  app.querySelectorAll('[data-save-note]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const id = x.getAttribute('data-save-note');
      const ta = document.getElementById(`noteText-${id}`);
      saveNote(id, ta ? ta.value.trim() : '');
    });
  });
  app.querySelectorAll('[data-edit-entry]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      editingEntryId = x.getAttribute('data-edit-entry');
      editingNoteId = null;
      render();
    });
  });
  app.querySelectorAll('[data-del-entry]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      deleteEntry(viewingDateKey, x.getAttribute('data-del-entry'));
    });
  });
  app.querySelectorAll('[data-cancel-entry]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      editingEntryId = null;
      render();
    });
  });
  app.querySelectorAll('[data-save-entry]').forEach(x => {
    x.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const id = x.getAttribute('data-save-entry');
      const labelEl = document.getElementById(`entryLabel-${id}`);
      const xpEl = document.getElementById(`entryXp-${id}`);
      const label = labelEl.value.trim();
      const xp = parseInt(xpEl.value, 10);
      if(!label || isNaN(xp)) return;
      saveEntryEdit(viewingDateKey, id, label, xp);
    });
  });
  app.querySelectorAll('[data-entry-select]').forEach(sel => {
    sel.addEventListener('change', () => {
      const id = sel.getAttribute('data-entry-select');
      const opt = sel.options[sel.selectedIndex];
      if(!opt.value) return;
      const labelEl = document.getElementById(`entryLabel-${id}`);
      const xpEl = document.getElementById(`entryXp-${id}`);
      if(labelEl) labelEl.value = opt.getAttribute('data-label');
      if(xpEl) xpEl.value = opt.getAttribute('data-xp');
    });
  });
  app.querySelectorAll('[data-cal-day]').forEach(x => {
    x.addEventListener('click', () => viewDate(x.getAttribute('data-cal-day')));
  });
  app.querySelectorAll('[data-progress-id]').forEach(cb => {
    cb.addEventListener('change', () => toggleProgressItem(cb.getAttribute('data-progress-id')));
  });
  app.querySelectorAll('[data-progress-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-progress-toggle');
      progressOpenSections[id] = !progressOpenSections[id];
      render();
    });
  });
  app.querySelectorAll('[data-del-custom-progress]').forEach(btn => {
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      removeCustomProgressItem(btn.getAttribute('data-del-custom-progress'));
    });
  });
  app.querySelectorAll('[data-del-builtin-progress]').forEach(btn => {
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      removeBuiltinProgressItem(btn.getAttribute('data-del-builtin-progress'), btn.getAttribute('data-del-builtin-label'));
    });
  });

  const undoBtn = document.getElementById('undoBtn');
  if(undoBtn) undoBtn.addEventListener('click', undoLast);

  const prevDayBtn = document.getElementById('prevDayBtn');
  if(prevDayBtn) prevDayBtn.addEventListener('click', () => shiftViewingDate(-1));
  const nextDayBtn = document.getElementById('nextDayBtn');
  if(nextDayBtn) nextDayBtn.addEventListener('click', () => shiftViewingDate(1));
  const jumpTodayBtn = document.getElementById('jumpTodayBtn');
  if(jumpTodayBtn) jumpTodayBtn.addEventListener('click', jumpToToday);

  const openBtn = document.getElementById('openAddPanel');
  if(openBtn) openBtn.addEventListener('click', () => { addPanelOpen = true; editingId = null; editingNoteId = null; editingEntryId = null; render(); });
  const cancelBtn = document.getElementById('cancelAdd');
  if(cancelBtn) cancelBtn.addEventListener('click', () => { addPanelOpen = false; render(); });
  const saveBtn = document.getElementById('saveAdd');
  if(saveBtn) saveBtn.addEventListener('click', () => {
    const labelEl = document.getElementById('newLabel');
    const xpEl = document.getElementById('newXp');
    const label = labelEl.value.trim();
    const xp = parseInt(xpEl.value, 10);
    if(!label || isNaN(xp) || xp === 0) return;
    addCustomAction(label, xp);
  });

  const cancelEditBtn = document.getElementById('cancelEdit');
  if(cancelEditBtn) cancelEditBtn.addEventListener('click', () => { editingId = null; render(); });
  const resetEditBtn = document.getElementById('resetEdit');
  if(resetEditBtn) resetEditBtn.addEventListener('click', () => resetOverride(editingId));
  const saveEditBtn = document.getElementById('saveEditBtn');
  if(saveEditBtn) saveEditBtn.addEventListener('click', () => {
    const labelEl = document.getElementById('editLabel');
    const xpEl = document.getElementById('editXp');
    const label = labelEl.value.trim();
    const xp = parseInt(xpEl.value, 10);
    if(!label || isNaN(xp) || xp === 0) return;
    saveEdit(editingId, label, xp);
  });

  const calToggle = document.getElementById('calToggle');
  if(calToggle) calToggle.addEventListener('click', () => { calendarOpen = !calendarOpen; render(); });

  const openProgressAddBtn = document.getElementById('openProgressAdd');
  if(openProgressAddBtn) openProgressAddBtn.addEventListener('click', () => { progressAddPanelOpen = !progressAddPanelOpen; render(); });
  const cancelProgressAddBtn = document.getElementById('cancelProgressAdd');
  if(cancelProgressAddBtn) cancelProgressAddBtn.addEventListener('click', () => { progressAddPanelOpen = false; render(); });
  const saveProgressAddBtn = document.getElementById('saveProgressAdd');
  if(saveProgressAddBtn) saveProgressAddBtn.addEventListener('click', () => {
    const labelEl = document.getElementById('newProgressLabel');
    const sectionEl = document.getElementById('newProgressSection');
    const label = labelEl.value.trim();
    const sectionId = sectionEl.value;
    if(!label || !sectionId) return;
    addCustomProgressItem(label, sectionId);
  });

  const signOutBtn = document.getElementById('signOutBtn');
  if(signOutBtn) signOutBtn.addEventListener('click', signOut);

  const themeBtn = document.getElementById('themeToggleBtn');
  if(themeBtn) themeBtn.addEventListener('click', toggleTheme);
  const layoutBtn = document.getElementById('layoutToggleBtn');
  if(layoutBtn) layoutBtn.addEventListener('click', toggleLayout);
  const designSelect = document.getElementById('designSelect');
  if(designSelect) designSelect.addEventListener('change', () => changeDesign(designSelect.value));
}

window.addEventListener('load', function(){
  applyTheme(getStoredTheme());
  applyDesign(getStoredDesign());
  layoutMode = getStoredLayout();

  const loginThemeBtn = document.getElementById('themeToggleBtnLogin');
  if(loginThemeBtn){
    loginThemeBtn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '🌙' : '☀️';
    loginThemeBtn.addEventListener('click', toggleTheme);
  }

  const loginDesignSelect = document.getElementById('designSelectLogin');
  if(loginDesignSelect){
    loginDesignSelect.value = designMode;
    loginDesignSelect.addEventListener('change', () => changeDesign(loginDesignSelect.value));
  }

  const auth = getStoredAuth();
  initGoogleButton();
  if(auth && auth.email){
    showApp(auth);
  } else {
    document.getElementById('loginScreen').style.display = 'block';
  }
});
</script>
</body>
</html>
